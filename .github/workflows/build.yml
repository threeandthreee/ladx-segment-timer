name: Build timer

on:
  push:
    tags:
      - '**'

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            exe-name: timer-linux
            runner: ubuntu-latest
          - os: windows-latest
            exe-name: timer-windows.exe
            runner: windows-latest
          - os: macos-latest
            exe-name: timer-macos
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Parse Version
        id: version
        run: |
          # Get the tag name (e.g., v1.0.0)
          TAG=${{ github.ref_name }}
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating timer-version file..."
          echo "$VERSION" > timer-version

      - name: Prepare Directory Structure
        run: |
          # Move pyevilemu to evilemu to match timer.spec
          if [ -d "pyevilemu" ]; then
            mv pyevilemu evilemu
          fi
          # Verify files exist for PyInstaller
          ls -la timer.py
          ls -la timer-version
          ls -la evilemu/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install PyInstaller if not in requirements
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller timer.spec --clean

      - name: Rename Executable
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/timer.exe ${{ matrix.exe-name }}
          else
            mv dist/timer ${{ matrix.exe-name }}
          fi

      - name: Create Release (if not exists)
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Timer ${{ steps.version.outputs.version }}
          draft: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true

      - name: Upload Artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ matrix.exe-name }}
          asset_name: ${{ matrix.exe-name }}
          asset_content_type: application/octet-stream