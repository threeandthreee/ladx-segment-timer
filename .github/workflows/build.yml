name: Build timer

on:
  push:
    tags:
      - '**'

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            exe-name: timer-linux
          - os: windows-latest
            runner: windows-latest
            exe-name: timer-windows.exe
          - os: macos-latest
            runner: macos-latest
            exe-name: timer-macos

    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Force bash for version parsing to avoid PowerShell syntax errors
      - name: Parse Version
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Remove 'v' prefix if present
          if [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
          else
            VERSION="$TAG"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "$VERSION" > timer-version

      - name: Prepare Directory Structure
        shell: bash
        run: |
          if [ -d "pyevilemu" ]; then
            mv pyevilemu evilemu
          fi
          ls -la timer.py timer-version evilemu/ || echo "Check paths"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          pyinstaller timer.spec --clean

      - name: Rename Executable
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/timer.exe ${{ matrix.exe-name }}
          else
            mv dist/timer ${{ matrix.exe-name }}
          fi

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Timer ${{ steps.version.outputs.version }}
          draft: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true

      - name: Upload Artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ matrix.exe-name }}
          asset_name: ${{ matrix.exe-name }}
          asset_content_type: application/octet-stream